<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Predictions on Real</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #1e1e2f;
    color: #e0e0e0;
    padding: 20px;
}

h1 {
    color: #4a90e2;
    text-align: center;
    font-size: 28px;
}

.section-title {
    color: #fff;
    font-size: 18px;
    margin: 20px 0 10px;
    font-weight: 600;
}

table {
    border-collapse: collapse;
    width: 100%;
    background-color: #2c2c3e;
    border-radius: 8px;
    overflow: hidden;
}

th, td {
    border: 1px solid #444;
    padding: 10px;
    text-align: center;
}

th {
    background-color: #3a3a55;
}

input {
    width: 90px;
    padding: 6px;
    border-radius: 4px;
    border: 1px solid #666;
    background-color: #2c2c3e;
    color: #e0e0e0;
    text-align: center;
}

button {
    padding: 10px 16px;
    margin: 5px 5px 15px 0;
    border-radius: 6px;
    border: none;
    background-color: #4a90e2;
    color: #1e1e2f;
    font-weight: bold;
    cursor: pointer;
}

.clear-btn {
    background-color: #d9534f;
    color: #fff;
}

.output {
    white-space: pre-line;
    font-family: monospace;
    background-color: #2c2c3e;
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
}

</style>
</head>

<body>

<h1>Predictions on Real</h1>

<div class="section-title">Unit Settings</div>
<input id="unitSize" placeholder="RAX per Unit (ex: 2000)" oninput="saveUnit()">

<div class="section-title">Bets</div>

<table id="bets">
<tr>
<th>Team</th>
<th>Market Odds</th>
<th>Units</th>
<th>Payout (RAX)</th>
<th>Result</th>
</tr>
</table>

<button onclick="addRow()">Add Row</button>
<button onclick="generate()">Generate</button>
<button class="clear-btn" onclick="clearAll()">Clear All</button>

<div class="output" id="output"></div>

<script>
const table = document.getElementById("bets");

// Odds → %
function oddsToPercent(odds){
  odds = Number(odds);
  if(odds<0) return Math.abs(odds)/(Math.abs(odds)+100)*100;
  return 100/(odds+100)*100;
}

function formatSigned(n){
  return (n>=0?"+":"")+n.toFixed(1)+"%";
}

// Save/load unit size
function saveUnit(){
  localStorage.setItem("unitSize", document.getElementById("unitSize").value);
}
function loadUnit(){
  document.getElementById("unitSize").value = localStorage.getItem("unitSize") || "";
}

// Add row
function addRow(data={}){
  const row = table.insertRow();
  ["team","odds","units","payout","result"].forEach(key=>{
    const cell = row.insertCell();
    const input = document.createElement("input");
    input.value = data[key] || (key==="result"?"W":"");
    input.placeholder = key;
    input.oninput = saveAll;
    cell.appendChild(input);
  });
}

// Save/load rows
function saveAll(){
  const rows=[...table.rows].slice(1).map(r=>[...r.cells].map(c=>c.children[0].value));
  localStorage.setItem("betsData", JSON.stringify(rows));
}

function loadAll(){
  const saved = JSON.parse(localStorage.getItem("betsData")||"[]");
  if(saved.length) saved.forEach(r=>addRow({team:r[0],odds:r[1],units:r[2],payout:r[3],result:r[4]}));
  else addRow();
}

function clearAll(){
  if(confirm("Clear all?")){
    localStorage.clear();
    location.reload();
  }
}

// EV calculation
function calcEV(units,payout,odds,unitSize){
  if(!payout||!units||!unitSize) return 0;
  const rax = units*unitSize;
  const realProb = rax/payout*100;
  const marketProb = oddsToPercent(odds);
  return (marketProb/realProb -1)*100;
}

function generate(){
  const unitSize = Number(document.getElementById("unitSize").value);
  let totalUnits=0,totalProfit=0,totalEV=0,wins=0,losses=0;

  let betBlocks="",recap="";

  [...table.rows].slice(1).forEach(row=>{
    const [team,odds,units,payout,result] = [...row.cells].map(c=>c.children[0].value);
    if(!team) return;

    const u = Number(units);
    const p = Number(payout);
    const o = Number(odds);

    const rax = u*unitSize;
    const market = oddsToPercent(o);
    const real = rax/p*100;
    const ev = calcEV(u,p,o,unitSize);
    const buyMax = market-5;

    const profit = result==="W"?p-rax:-rax;

    totalUnits += u;
    totalProfit += profit;
    totalEV += ev*u;

    result==="W"?wins++:losses++;

    betBlocks +=
`Team: ${team}
Bought: ${u}u (${rax.toLocaleString()} RAX)
Real: (${Math.round(real)}%)
Market: (${o}) (${market.toFixed(1)}%)
EV: ${formatSigned(ev)}
Buy ≤ (${Math.round(buyMax)}%)
Result: ${result==="W"?"✅":"❌"}

`;

    recap += `${team} ML (${o}): ${result==="W"?"✅":"❌"}\n`;
  });

  const expected = totalEV/totalUnits;
  const actual = (totalProfit/(totalUnits*unitSize))*100;
  const luck = actual-expected;

  document.getElementById("output").textContent =
betBlocks+
"-----------------\n"+
recap+
"-----------------\n"+
`Record: ${wins}-${losses}
Total Units: ${totalUnits.toFixed(1)}u
Profit: ${totalProfit.toFixed(0)} RAX
Expected Return: ${formatSigned(expected)}
Actual Return: ${formatSigned(actual)}
Luck: ${formatSigned(luck)}`;
}

loadAll();
loadUnit();
</script>

</body>
</html>
